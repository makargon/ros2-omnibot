motor_controller:
  ros__parameters:
    wheel_radius_m: 0.05
    wheel_base_m: 0.11
    max_wheel_rad_s: 25.0
    # Rotate cmd_vel frame if needed (deg). Example: 90 swaps WS/AD behavior.
    cmd_frame_rotation_deg: 90.0
    control_rate_hz: 30.0
    encoder_rate_hz: 200.0
    encoder_threshold: 512

    # MCP3008 over SPI0:
    # CLK  -> GPIO11
    # DOUT -> GPIO9
    # DIN  -> GPIO10
    # CS   -> GPIO8
    spi_bus: 0
    spi_device: 0

    # PCA9685 over I2C
    # address 0x40, OE on GPIO16 (active-low)
    pca9685.i2c_bus: 1
    pca9685.address: 64
    pca9685.pwm_hz: 1000
    pca9685.oe_gpio: 16

    # Motor 1
    # PWM PWM0, IN1 GPIO5, IN2 GPIO6, Enc A CH0, Enc B CH1
    motor1.pwm_channel: 0
    motor1.in1_gpio: 5
    motor1.in2_gpio: 6
    motor1.enc_a_ch: 0
    motor1.enc_b_ch: 1
    motor1.direction_sign: 1

    # Motor 2
    # PWM PWM1, IN1 GPIO17, IN2 GPIO22, Enc A CH3, Enc B CH4
    motor2.pwm_channel: 1
    motor2.in1_gpio: 17
    motor2.in2_gpio: 22
    motor2.enc_a_ch: 3
    motor2.enc_b_ch: 4
    motor2.direction_sign: 1

    # Motor 3
    # PWM PWM2, IN1 GPIO26, IN2 GPIO27, Enc A CH5, Enc B CH6
    motor3.pwm_channel: 2
    motor3.in1_gpio: 26
    motor3.in2_gpio: 27
    motor3.enc_a_ch: 5
    motor3.enc_b_ch: 6
    # Set -1 when wheel 3 is physically mirrored or wired opposite.
    motor3.direction_sign: -1
