servo_controller:
  ros__parameters:
    pca9685.i2c_bus: 1
    pca9685.address: 64
    pca9685.pwm_hz: 50

    # Servos on PCA9685 channels PWM4, PWM5, PWM6
    servo.channels: [4, 5, 6]

    # Angle mapping
    servo.min_deg: 0.0
    servo.max_deg: 180.0
    servo.min_pulse_us: 500.0
    servo.max_pulse_us: 2500.0

    # Startup position for 3 servos
    servo.default_deg: [90.0, 90.0, 90.0]
